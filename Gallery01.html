<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Gallery</title>
  <!-- link our css files to html -->
  <link rel="stylesheet" href="/css/general.css">
  <link rel="stylesheet" href="/css/gallery01.css">

</head>
<body>

  <!-- for my Gallery we are using Flexbox so we are going
        to need a parent container to hold all html element
        we are going to use
       -->
  <div class="container">
    <!-- creating container called photo to hold the image -->
     <div class="photo">
        <img src="/img/fox.png" alt="">
     </div>
     <div class="photo">
        <img src="/img/whale.png" alt="">
     </div>
     <div class="photo">
        <img src="/img/baboon.png" alt="">
     </div>
     <div class="photo1">
        <img  onmouseover="bigImg(this)" 
           onmouseout="normalImg(this)"
           src="/img/gazelle.png" 
        alt="">
     </div>
     </div> 
     <script src="/scripts/gallery01-photo4.js"></script>
</body>
</html>
