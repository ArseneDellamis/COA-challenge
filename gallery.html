<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery</title>
    <!-- Link my css files to html file  -->
    <link rel="stylesheet" href="/css/general.css" />

    <!-- Container for the gallery -->
    <div class="container">

            <h1>FONNEC</h1>
            <h1>FOX</h1>

          </div>
          <div class="link">
            <p>
              <a href="#"> Know more &rarr; </a>
            </p>

        </div>

        <div class="photo">
          <img src="/img/whale.png" alt="" />

            <h1 class="first">HUMPBACK</h1>
            <h1 class="second">WHALE</h1>
            <p>South Africa</p>

            <p>
              <a href="#"> Know more &rarr; </a>

        </div>

        <div class="photo">
          <img src="/img/baboon.png" alt="" />

            <h1 class="first">COMMON BROWN</h1>

      </div>
    </div>

</html>
